# Config for training MVInverse-style inverse rendering heads on top of VGGT.
#
# Key design:
# - VGGT backbone (aggregator, patch_embed) and original heads are FROZEN
# - LoRA adapters on frame/global blocks are TRAINABLE
# - InverseHeads (5 DPT heads + ResNeXt) are TRAINABLE
# - Original VGGT heads are NOT run during training (skip_vggt_heads_in_train=True)
#   to save VRAM
#
# Usage:
#   python training/launch.py --config-path config --config-name inverse_rendering \
#     inverse_rendering.enable_inverse=True \
#     inverse_rendering.enable_lora=True

defaults:
  - default_dataset.yaml

exp_name: inverse_rendering
img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 3
max_img_per_gpu: 9 # fewer images to fit inverse heads in VRAM

limit_train_batches: 4000
limit_val_batches: 200
# limit_train_batches: 600
# limit_val_batches: 20

# ============================================================
# Inverse Rendering Controls
# ============================================================
inverse_rendering:
  enable_inverse: True       # Enable MVInverse heads (albedo, metallic, roughness, normal, shading)
  # Backbone finetuning strategy:
  #   "lora" — freeze original frame/global blocks, train LoRA adapters (default, low VRAM)
  #   "full" — directly finetune the original frame/global blocks (no LoRA, higher VRAM)
  # `enable_lora` below is derived from this in launch.py; do not set it manually.
  frozen_module_names: "full"      # "lora" | "full"
  finetune_mode: "full"
  enable_lora: True          # (auto-derived from finetune_mode in launch.py)
  lora_rank: 16              # LoRA rank parameter
  lora_alpha: 32             # LoRA alpha (scaling = alpha / rank)
  lora_tail_layers: 6        # Number of tail layers with higher LoRA rank (0 = disabled, all use lora_rank)
  lora_tail_rank: 64         # LoRA rank for tail layers (only used when lora_tail_layers > 0)
  frames_chunk_size: 8       # Number of frames processed at once in DPT heads
  skip_vggt_heads_in_train: True   # Skip original VGGT heads during training to save VRAM

  # Light Token & SG
  enable_light_token: False         # Enable learnable light token for global illumination
  sg_num_lobes: 24                 # Number of Spherical Gaussian lobes
  sg_hidden_dim: 512               # Hidden dim of SG decoder MLP
  lora_global_base_rank: 16        # Global blocks use higher LoRA rank

  # BRDF Renderer
  enable_brdf_render: False         # Enable Cook-Torrance GGX BRDF rendering

  # ResNeXt pretrained init.
  # True (default): build ResNeXt-101 from WSL → ImageNet fallback weights.
  # False: random init (matches the original behaviour; useful only if you
  #        always resume from a checkpoint that already contains
  #        inverse_heads.res_encoder.* keys).
  # Note: when the resume checkpoint DOES contain res_encoder weights, they
  # overwrite the pretrained init via load_state_dict(strict=False), so this
  # flag only matters for cold-starts (e.g. from vggt_1b_pretrained.pt).
  resnext_pretrained: True

  # Disable ResNeXt fusion at deep stages (layer3 + layer4) inside DPTHeadRes.
  # ResNeXt-101's layer3 has 23 bottleneck blocks; their accumulated BN/conv
  # stack produces high-norm OOD outliers on uniform regions, polluting the
  # fused features. Disabling fuse for stages 3/4 keeps only the cleaner
  # low-level (layer1/2) detail contribution.
  resnext_disable_layer34: False

  # Dynamic Loss Weighting (Kendall et al. 2018 uncertainty weighting).
  # Adds one learnable log-variance parameter per head and applies
  #     L_total = sum_i [ 0.5 * exp(-s_i) * (static_weight_i * L_i) + 0.5 * s_i ]
  # so heads with consistently large loss naturally down-weight themselves —
  # they stop pulling gradient away from the other heads. Static `weight_*`
  # values in `loss.inverse` still apply on top of the learned weighting.
  enable_dynamic_weighting: False

  # TTO (Test-Time Optimization) — inference only
  tto:
    enable: False                  # Set True at inference for per-scene adaptation
    iterations: 50
    lr: 7e-4

  # Per-head type: "dpt" (transformer-only) or "dpt_res" (with ResNeXt fusion)
  head_type:
    albedo: "dpt_res"
    metallic: "dpt"
    roughness: "dpt"
    normal: "dpt"
    shading: "dpt_res"

  # Per-head positional embedding (VGGT-style UV sincos pos_embed in DPT head)
  head_pos_embed:
    albedo: False
    metallic: False
    roughness: False
    normal: False
    shading: False

# ============================================================
# Model
# ============================================================
model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True # Keep architecture (but frozen / skipped in training)
  enable_depth: True
  enable_point: True
  enable_track: True
  enable_inverse: ${inverse_rendering.enable_inverse}
  enable_lora: ${inverse_rendering.enable_lora}
  lora_rank: ${inverse_rendering.lora_rank}
  lora_alpha: ${inverse_rendering.lora_alpha}
  lora_tail_layers: ${inverse_rendering.lora_tail_layers}
  lora_tail_rank: ${inverse_rendering.lora_tail_rank}
  inverse_frames_chunk_size: ${inverse_rendering.frames_chunk_size}
  skip_vggt_heads_in_train: ${inverse_rendering.skip_vggt_heads_in_train}
  inverse_head_type: ${inverse_rendering.head_type}
  inverse_head_pos_embed: ${inverse_rendering.head_pos_embed}
  enable_light_token: ${inverse_rendering.enable_light_token}
  sg_num_lobes: ${inverse_rendering.sg_num_lobes}
  sg_hidden_dim: ${inverse_rendering.sg_hidden_dim}
  lora_global_base_rank: ${inverse_rendering.lora_global_base_rank}
  enable_brdf_render: ${inverse_rendering.enable_brdf_render}
  resnext_pretrained: ${inverse_rendering.resnext_pretrained}
  resnext_disable_layer34: ${inverse_rendering.resnext_disable_layer34}
  enable_dynamic_weighting: ${inverse_rendering.enable_dynamic_weighting}
  tto_config: ${inverse_rendering.tto}

# ============================================================
# Loss
# ============================================================
loss:
  _target_: loss.MultitaskLoss
  # Disable original VGGT losses (we don't compute them during inverse training)
  camera: null
  depth: null
  point: null
  track: null
  # Inverse rendering loss
  inverse:
    weight_albedo: 1.0
    weight_metallic: 1.0
    weight_roughness: 1.0
    weight_normal: 1.0
    weight_shading: 1.0
    msg_scales: 4
    # --- Render Loss: MSE(albedo * shading, input_image) ---
    enable_render_loss: False
    weight_render: 1.0
    # --- SSIM Loss per head ---
    ssim:
      enable_albedo: False
      enable_metallic: False
      enable_roughness: False
      enable_normal: False
      enable_shading: False
      weight: 0.5
    # --- Frequency Loss per head (high-freq emphasis, excludes shading by default) ---
    freq:
      enable_albedo: False
      enable_metallic: False
      enable_roughness: False
      enable_normal: False
      enable_shading: False    # shading typically excluded
      weight: 0.1
      downsample_size: 256     # FFT downsample target (smaller = faster, less VRAM)
      high_freq_weight: 2.0    # Weight multiplier for high-frequency components
    # --- Dispersion penalty (anti-collapse) for metallic & roughness ---
    # Penalty kicks in only when masked std(pred) drops below dispersion_target_std,
    # pushing the model away from the "all-constant near-zero" degenerate solution
    # observed for interiorverse roughness / metallic.
    enable_dispersion: True
    weight_dispersion: 1.0
    dispersion_target_std: 0.12
    # --- Huber loss instead of L2 for reg part of each head (per-head) ---
    # Quadratic for small errors (|d|<=delta), linear above. Robust to per-pixel
    # GT outliers from low-quality dataset frames without sacrificing precision
    # on well-behaved pixels. Default delta=0.1 for [0,1]-range images.
    # Set per-head: only heads whose enable_* is True use Huber; the rest keep
    # L2/MSE. `normal` uses a cosine loss and is unaffected. (A bare
    # `use_huber: True/False` is also still accepted and applies to all heads.)
    use_huber:
      enable_albedo: True
      enable_metallic: False
      enable_roughness: False
      enable_shading: True
    huber_delta: 0.1
    # --- Dynamic Loss Weighting (Kendall uncertainty) ---
    # Reads `task_log_var` exposed by inverse_heads (must also set
    # inverse_rendering.enable_dynamic_weighting=True). Combines per-head loss
    # via   0.5 * exp(-s) * (static_weight * L) + 0.5 * s   to prevent one
    # head's gradient magnitude from drowning out the others.
    enable_dynamic_weighting: False
    # --- SG / BRDF Render Loss ---
    enable_brdf_render_loss: False
    weight_brdf_render: 1.0
    weight_sg_repulsion: 0.01
    sg_repulsion_threshold: 0.9
    enable_sg_hungarian: False   
    weight_sg_hungarian: 1.0
    brdf_render_downsample: 2    # Downsample factor for BRDF rendering (VRAM saving)
    # --- Light Token Phase Routing ---
    sg_phase1_end: 0.2
    sg_phase2_end: 0.4
    weight_sg_l2: 1.0              # L2 MSE against openroomsff HDR-fitted SG ground truth (ends after phase1)
    enable_sg_l2: False             # Toggle for SG L2 loss
    enable_env_map_log_l2: False    # Toggle for environment map Log-L2 loss
    weight_env_map_log_l2: 1.0     # Weight for environment map Log-L2 loss
    enable_diffuse_constraint: False # Compute diffuse irradiance penalty on hypersim dataset
    weight_diffuse_constraint: 0.5

# ============================================================
# Logging
# ============================================================
logging:
  log_dir: logs
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_inv_total
        - loss_inv_albedo
        - loss_inv_metallic
        - loss_inv_roughness
        - loss_inv_normal
        - loss_inv_shading
        - loss_inv_albedo_si
        # Render loss
        - loss_inv_render
        # SSIM losses per head
        - loss_inv_albedo_ssim
        - loss_inv_metallic_ssim
        - loss_inv_roughness_ssim
        - loss_inv_normal_ssim
        - loss_inv_shading_ssim
        # Frequency losses per head
        - loss_inv_albedo_freq
        - loss_inv_metallic_freq
        - loss_inv_roughness_freq
        - loss_inv_normal_freq
        # Dispersion penalty (anti-collapse) for m/r
        - loss_inv_metallic_disp
        - loss_inv_roughness_disp
        # --- Per-dataset metallic / roughness breakdown ---
        # Sparse: each key is logged only on steps where that dataset is in the
        # batch. Grouped under loss_inv_metallic/ and loss_inv_roughness/ in TB.
        - loss_inv_metallic/structured3d
        - loss_inv_metallic/olbedo
        - loss_inv_metallic/hypersim
        - loss_inv_metallic/interiorverse
        - loss_inv_metallic/matrixcity_normal
        - loss_inv_metallic/matrixcity_unnormal
        - loss_inv_roughness/structured3d
        - loss_inv_roughness/olbedo
        - loss_inv_roughness/hypersim
        - loss_inv_roughness/interiorverse
        - loss_inv_roughness/matrixcity_normal
        - loss_inv_roughness/matrixcity_unnormal
        # Dynamic loss weighting log-variance (if enabled)
        - loss_inv_albedo_logvar
        - loss_inv_metallic_logvar
        - loss_inv_roughness_logvar
        - loss_inv_normal_logvar
        - loss_inv_shading_logvar
        # SG / BRDF losses
        - loss_brdf_render
        - loss_sg_repulsion
        - loss_sg_total
        - loss_sg_l2
        - loss_sg_env_map_log_l2
        - loss_sg_diffuse_constraint
    val:
      keys_to_log:
        - loss_objective
        - loss_inv_total
        - loss_inv_albedo
        - loss_inv_metallic
        - loss_inv_roughness
        - loss_inv_normal
        - loss_inv_shading
        # Render loss
        - loss_inv_render
        # SSIM losses per head
        - loss_inv_albedo_ssim
        - loss_inv_metallic_ssim
        - loss_inv_roughness_ssim
        - loss_inv_normal_ssim
        - loss_inv_shading_ssim
        # Frequency losses per head
        - loss_inv_albedo_freq
        - loss_inv_metallic_freq
        - loss_inv_roughness_freq
        - loss_inv_normal_freq
        # Dispersion penalty (anti-collapse) for m/r
        - loss_inv_metallic_disp
        - loss_inv_roughness_disp
        # --- Per-dataset metallic / roughness breakdown ---
        # Sparse: each key is logged only on steps where that dataset is in the
        # batch. Grouped under loss_inv_metallic/ and loss_inv_roughness/ in TB.
        - loss_inv_metallic/structured3d
        - loss_inv_metallic/olbedo
        - loss_inv_metallic/hypersim
        - loss_inv_metallic/interiorverse
        - loss_inv_metallic/matrixcity_normal
        - loss_inv_metallic/matrixcity_unnormal
        - loss_inv_roughness/structured3d
        - loss_inv_roughness/olbedo
        - loss_inv_roughness/hypersim
        - loss_inv_roughness/interiorverse
        - loss_inv_roughness/matrixcity_normal
        - loss_inv_roughness/matrixcity_unnormal
        # SG / BRDF losses
        - loss_brdf_render
        - loss_sg_repulsion
        - loss_sg_total
        - loss_sg_l2
        - loss_sg_env_map_log_l2
        - loss_sg_diffuse_constraint

# ============================================================
# Checkpoint
# ============================================================
checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  auto_resume: False  # Set to False to delete past ckpts and train from pretrained weights (epoch 0)
  load_weights_only: True  # Architecture changed (P2 added GroupNorm + fuse_gates); optimizer/epoch state from logs_new is incompatible, only load model weights.
  # resume_checkpoint_path: /train-data-3-hdd/cerosop/vggt/vggt_origin/vggt/logs_new/inverse_rendering/ckpts/checkpoint.pt   # Warm-start from logs_new (architecture changed, fuse_projects will be re-init via strict=False)
  resume_checkpoint_path: /train-data-3-hdd/cerosop/vggt/vggt_origin/vggt/weight/vggt_1b_pretrained.pt   # Alt: cold-start from VGGT pretrained weights
  strict: False   # Strict=False: allow missing keys (LoRA, inverse heads not in pretrained ckpt)

# ============================================================
# Optimization
# ============================================================
optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    # lr: 1e-4
    # weight_decay: 0.05
    # lr: 4e-5
    # weight_decay: 0.01
    lr: 1e-5
    weight_decay: 0.05

  # Freeze everything EXCEPT LoRA adapters and inverse heads
  frozen_module_names:
    - "*aggregator.patch_embed*" # DINOv2 encoder
    - "*aggregator.frame_blocks*" # Original frame attention blocks
    - "*aggregator.global_blocks*" # Original global attention blocks
    - "*aggregator.camera_token*" # Camera tokens
    # - "*aggregator.register_token*" # Register tokens
    - "*camera_head*" # Original VGGT camera head
    - "*depth_head*" # Original VGGT depth head
    - "*point_head*" # Original VGGT point head
    - "*track_head*" # Original VGGT track head
  # After freezing, ONLY these are trainable:
  #   - aggregator.lora_frame_blocks.*   (LoRA A/B matrices)
  #   - aggregator.lora_global_blocks.*  (LoRA A/B matrices)
  #   - aggregator.light_token           (Light token for SG, NEW)
  #   - inverse_heads.res_encoder.*      (ResNeXt-101)
  #   - inverse_heads.albedo_head.*      (DPTHeadRes or DPTHead)
  #   - inverse_heads.metallic_head.*    (DPTHead or DPTHeadRes)
  #   - inverse_heads.roughness_head.*   (DPTHead or DPTHeadRes)
  #   - inverse_heads.normal_head.*      (DPTHead or DPTHeadRes)
  #   - inverse_heads.shading_head.*     (DPTHeadRes or DPTHead)
  #   - inverse_heads.sg_decoder.*       (SG Decoder MLP, NEW)

  amp:
    enabled: True
    amp_dtype: bfloat16

  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["inverse_heads"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["lora_frame_blocks"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["lora_global_blocks"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["light_token"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["register_token"]   # Unfrozen in full mode (aligned with MVInverse)
        max_norm: 1.0
        norm_type: 2

  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 1e-4
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 1e-4
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ["rescaled", "rescaled"]
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

# ============================================================
# Training
# ============================================================
max_epochs: 30

# ============================================================
# Data — Override with your inverse rendering dataset
# ============================================================
data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      img_nums: [3, 9]
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        # - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
        #   weight: 1.0
        #   split: train
        #   DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_openroomsff
        # - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
        #   weight: 0.025
        #   split: train
        #   DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_cgintrinsics
        # - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
        #   weight: 0.125
        #   split: train
        #   DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_openroomsff
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.05
          split: train
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_structured3d
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.025
          split: train
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_olbedo
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.4
          # weight: 1.0
          split: train
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_hypersim
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.275
          split: train
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_interiorverse
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.125
          # weight: 1.0
          split: train
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_matrixcity_normal
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.125
          split: train
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_matrixcity_unnormal
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      img_nums: [3, 9]
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        # - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
        #   weight: 1.0
        #   split: test
        #   DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_openroomsff
        # - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
        #   weight: 0.025
        #   split: test
        #   DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_cgintrinsics
        # - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
        #   weight: 0.125
        #   split: test
        #   DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_openroomsff
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.05
          split: test
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_structured3d
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.025
          split: test
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_olbedo
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.4
          # weight: 1.0
          split: test
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_hypersim
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.275
          split: test
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_interiorverse
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.125
          # weight: 1.0
          split: test
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_matrixcity_normal
        - _target_: data.datasets.inverse_rendering_dataset.InverseRenderingDataset
          weight: 0.125
          split: test
          DATA_DIR: /train-data-3-hdd/cerosop/vggt/processed_data_matrixcity_unnormal

# ============================================================
# Distributed
# ============================================================
distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True   # True because VGGT heads are frozen and unused
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
